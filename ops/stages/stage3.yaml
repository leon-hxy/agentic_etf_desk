stage: Stage 3 data and backtest evidence
status: planned
stable_branch: main
construction_branch: stage/stage3-data-backtest
task_branch_prefix: task/
business_code_started: false
repo_only_planning_stage: true
review_governance:
  small_stage_review: codex_self_review
  major_stage_review: manual_chatgpt_review
  chatgpt_computer_use_auto_review: deprecated
  codex_requests_chatgpt_for_small_stages: false
  automatic_review_delivery: false
safety_boundaries:
  asset_scope: ETF-only
  forbidden_assets: individual stocks, options, futures, crypto assets, leveraged ETFs, inverse ETFs unless future explicit allowlist is added
  final_trading: manually decided by the user
  live_runtime_changes: require explicit user approval
  computer_use_for_review_delivery: deprecated
small_stages:
  - id: stage3a_data_source
    file: ops/tasks/stage3a_data_source.md
    status: planned
    scope: real ETF data source integration plan
    allowed_data: read-only public ETF data
    review: codex_self_review
  - id: stage3b_data_quality
    file: ops/tasks/stage3b_data_quality.md
    status: planned
    scope: missing values, ETF start dates, adjusted prices, abnormal prices
    review: codex_self_review
  - id: stage3c_backtest_validation
    file: ops/tasks/stage3c_backtest_validation.md
    status: planned
    scope: formal backtest validation replacing sample-only reports
    review: codex_self_review
  - id: stage3d_strategy_evidence_report
    file: ops/tasks/stage3d_strategy_evidence_report.md
    status: planned
    scope: GTAA, Dual Momentum, 60/40, and Buy-and-Hold evidence package
    review: codex_self_review
major_review:
  id: stage3e_major_review_package
  file: ops/tasks/stage3_major_review_package.md
  status: planned
  trigger: after Stage 3A through Stage 3D are complete
  review: manual_chatgpt_review
  feishu_notification: ask the user whether to request ChatGPT review
