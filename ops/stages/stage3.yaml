stage: Stage 3 data and backtest evidence
status: stage3e_major_review_package_ready
stable_branch: main
construction_branch: stage/stage3-data-backtest
task_branch_prefix: task/
business_code_started: true
repo_only_planning_stage: false
runner:
  file: ops/runners/stage3_runner_state.json
  status: major_stage_ready
  current_minor_stage: Stage 3E
  current_task: ops/tasks/stage3_major_review_package.md
  completed_minor_stages:
    - Stage 3A
    - Stage 3B
    - Stage 3C
    - Stage 3D
    - Stage 3E
  remaining_minor_stages: []
review_governance:
  small_stage_review: codex_self_review
  major_stage_review: manual_chatgpt_review
  chatgpt_computer_use_auto_review: deprecated
  codex_requests_chatgpt_for_small_stages: false
  automatic_review_delivery: false
safety_boundaries:
  asset_scope: ETF-only
  forbidden_assets: individual stocks, options, futures, crypto assets, leveraged ETFs, inverse ETFs unless future explicit allowlist is added
  final_trading: manually decided by the user
  live_runtime_changes: require explicit user approval
  computer_use_for_review_delivery: deprecated
small_stages:
  - id: stage3a_data_source
    file: ops/tasks/stage3a_data_source.md
    status: completed_internal_review
    scope: real ETF data source integration plan
    allowed_data: read-only public ETF data
    review: codex_self_review
    outputs:
      - docs/stage3a_data_source_plan.md
      - configs/data_sources/stage3_data_sources.json
      - reports/internal_reviews/stage3/stage3a_data_source.md
      - reports/internal_reviews/stage3/stage3a_data_source.json
  - id: stage3b_data_quality
    file: ops/tasks/stage3b_data_quality.md
    status: completed_internal_review
    scope: missing values, ETF start dates, adjusted prices, abnormal prices
    review: codex_self_review
    outputs:
      - scripts/data/check_data_quality.py
      - reports/data_quality/stage3b_data_quality_report.md
      - reports/data_quality/stage3b_data_quality_report.json
      - reports/internal_reviews/stage3/stage3b_data_quality.md
      - reports/internal_reviews/stage3/stage3b_data_quality.json
  - id: stage3c_backtest_validation
    file: ops/tasks/stage3c_backtest_validation.md
    status: completed_internal_review
    depends_on: Stage 3B completed_internal_review
    scope: formal backtest validation replacing sample-only reports
    review: codex_self_review
    chatgpt_review_requested: false
    outputs:
      - scripts/backtest/validate_stage3c_backtest.py
      - reports/backtest_validation/stage3c_backtest_validation_report.md
      - reports/backtest_validation/stage3c_backtest_validation_report.json
      - reports/internal_reviews/stage3/stage3c_backtest_validation.md
      - reports/internal_reviews/stage3/stage3c_backtest_validation.json
  - id: stage3d_strategy_evidence_report
    file: ops/tasks/stage3d_strategy_evidence_report.md
    status: completed_internal_review
    depends_on: Stage 3C completed_internal_review
    scope: GTAA, Dual Momentum, 60/40, and Buy-and-Hold evidence package
    review: codex_self_review
    chatgpt_review_requested: false
    outputs:
      - scripts/reports/generate_stage3d_strategy_evidence.py
      - reports/strategy_evidence/stage3d_strategy_evidence_report.md
      - reports/strategy_evidence/stage3d_strategy_evidence_report.json
      - reports/internal_reviews/stage3/stage3d_strategy_evidence_report.md
      - reports/internal_reviews/stage3/stage3d_strategy_evidence_report.json
major_review:
  id: stage3e_major_review_package
  file: ops/tasks/stage3_major_review_package.md
  status: major_review_package_ready
  depends_on: Stage 3D completed_internal_review
  trigger: after Stage 3A through Stage 3D are complete
  review: manual_chatgpt_review
  feishu_notification: user-facing notification to request manual ChatGPT review
  outputs:
    - reports/major_reviews/stage3/latest.md
    - reports/major_reviews/stage3/latest.json
